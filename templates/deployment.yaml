---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-deploy
  labels:
    myversion: "1"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Chart.name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.name }}
    spec: # specification du pod
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: springboot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"

          env:
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: {{ .Values.app.contextPath | default "/" | quote }}